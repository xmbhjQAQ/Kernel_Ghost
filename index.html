<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Kernel Ghost: 2036</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      --bg: #050706;
      --panel: #0a0f0d;
      --panel-2: #0f1613;
      --line: #22342e;
      --line-strong: #3c5f52;
      --text: #e2eee8;
      --muted: #7e9088;
      --green: #7dffb2;
      --green-dim: #3abf7f;
      --cyan: #72d8e8;
      --red: #ff6363;
      --amber: #e7c86a;
      --shadow: rgba(0, 0, 0, 0.45);
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      --scan: rgba(125, 255, 178, 0.035);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      overflow: hidden;
    }

    body {
      min-width: 320px;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      position: relative;
      height: 100dvh;
      min-height: 100%;
      padding: max(14px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right))
        max(14px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
      overflow: hidden;
      background:
        radial-gradient(circle at 12% 18%, rgba(114, 216, 232, 0.1), transparent 30%),
        linear-gradient(180deg, rgba(125, 255, 178, 0.045), transparent 34%),
        var(--bg);
    }

    .app::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          to bottom,
          transparent 0,
          transparent 2px,
          var(--scan) 3px,
          transparent 4px
        );
      mix-blend-mode: screen;
      opacity: 0.72;
      z-index: 3;
    }

    .shell {
      width: 100%;
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 360px);
      gap: 12px;
      margin: 0 auto;
    }

    .terminal,
    .side-panel {
      min-height: 0;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(15, 22, 19, 0.97), rgba(5, 7, 6, 0.98));
      box-shadow: 0 18px 50px var(--shadow), inset 0 0 0 1px rgba(125, 255, 178, 0.03);
    }

    .terminal {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      position: relative;
      overflow: hidden;
    }

    .terminal::after,
    .side-panel::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border: 1px solid rgba(125, 255, 178, 0.06);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 42px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(10, 15, 13, 0.95);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      width: 12px;
      height: 12px;
      border: 1px solid var(--green);
      box-shadow: 0 0 14px rgba(125, 255, 178, 0.7);
      flex: 0 0 auto;
    }

    .brand-title {
      color: var(--green);
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 13px;
    }

    .session-meta {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .terminal-log {
      min-height: 0;
      overflow: auto;
      padding: 14px 16px 18px;
      scrollbar-color: var(--line-strong) transparent;
      scrollbar-width: thin;
    }

    .line {
      min-height: 20px;
      line-height: 1.55;
      font-size: 14px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      text-wrap: pretty;
    }

    .line.command {
      color: var(--green);
      margin-top: 8px;
    }

    .line.system {
      color: var(--text);
    }

    .line.ai {
      color: var(--cyan);
    }

    .line.warning {
      color: var(--red);
    }

    .line.dim {
      color: var(--muted);
    }

    .line.flag {
      color: var(--amber);
      font-weight: 700;
    }

    .input-row {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      padding: 10px 12px 12px;
      border-top: 1px solid var(--line);
      background: rgba(5, 7, 6, 0.96);
    }

    .terminal-label {
      color: var(--green);
      font-size: 14px;
      white-space: nowrap;
    }

    .command-input {
      min-width: 0;
      min-height: 44px;
      border: 1px solid transparent;
      outline: none;
      background: transparent;
      color: var(--text);
      caret-color: var(--green);
      padding: 8px 2px;
    }

    .command-input:focus {
      border-bottom-color: var(--line-strong);
    }

    .command-input:disabled {
      color: var(--muted);
    }

    .side-panel {
      position: relative;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      overflow: hidden;
    }

    .panel-section {
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .panel-section:last-child {
      border-bottom: 0;
    }

    .section-kicker {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
    }

    .ticket-title {
      margin: 0 0 10px;
      color: var(--text);
      font-size: 16px;
      line-height: 1.35;
    }

    .ticket-body {
      margin: 0;
      color: #b9c9c1;
      line-height: 1.55;
      font-size: 13px;
      text-wrap: pretty;
    }

    .command-chip {
      display: block;
      margin-top: 10px;
      padding: 8px;
      border: 1px solid var(--line);
      background: rgba(125, 255, 178, 0.04);
      color: var(--green);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .status-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .status-item {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      color: var(--text);
      font-size: 12px;
    }

    .status-label {
      color: var(--muted);
    }

    .meter {
      height: 8px;
      border: 1px solid var(--line-strong);
      background: #050706;
      overflow: hidden;
    }

    .meter-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--green-dim), var(--cyan));
      transition: width 320ms ease;
    }

    .llm-status {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
      color: var(--muted);
    }

    .llm-dot {
      width: 8px;
      height: 8px;
      border: 1px solid currentColor;
      flex: 0 0 auto;
    }

    .llm-status.online {
      color: var(--cyan);
    }

    .llm-status.offline {
      color: var(--muted);
    }

    .llm-status.error {
      color: var(--red);
    }

    .discoveries {
      display: grid;
      gap: 8px;
      min-height: 0;
      overflow: auto;
    }

    .discovery {
      border: 1px solid var(--line);
      padding: 9px;
      background: rgba(255, 255, 255, 0.025);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .discovery.found {
      color: var(--cyan);
      border-color: rgba(114, 216, 232, 0.42);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 12px;
    }

    .control-button,
    .modal-button {
      min-height: 44px;
      border: 1px solid var(--line-strong);
      background: rgba(125, 255, 178, 0.07);
      color: var(--text);
      cursor: pointer;
    }

    .control-button:hover,
    .control-button:focus,
    .modal-button:hover,
    .modal-button:focus {
      outline: none;
      border-color: var(--green);
      color: var(--green);
    }

    .control-button.danger {
      border-color: rgba(255, 99, 99, 0.55);
      background: rgba(255, 99, 99, 0.08);
    }

    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(5, 7, 6, 0.82);
      backdrop-filter: blur(8px);
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, visibility 180ms ease;
      z-index: 5;
    }

    .screen.active {
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      width: min(560px, 100%);
      border: 1px solid var(--line-strong);
      background: linear-gradient(180deg, #0f1613, #050706);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.65);
      padding: 18px;
    }

    .modal-title {
      margin: 0 0 10px;
      color: var(--green);
      font-size: 22px;
      line-height: 1.2;
    }

    .modal-copy {
      margin: 0 0 14px;
      color: #c3d5cd;
      line-height: 1.6;
      font-size: 14px;
    }

    .name-input {
      width: 100%;
      min-height: 46px;
      margin: 0 0 14px;
      border: 1px solid var(--line-strong);
      background: #050706;
      color: var(--text);
      padding: 10px;
      outline: none;
    }

    .name-input:focus {
      border-color: var(--green);
    }

    .modal-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .ending-panel {
      border-color: rgba(114, 216, 232, 0.55);
    }

    .mobile-ticket-toggle {
      display: none;
    }

    @media (max-width: 820px) {
      html,
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: 100vh;
        overflow: visible;
      }

      .shell {
        height: auto;
        min-height: calc(100vh - 28px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
        grid-template-columns: 1fr;
        grid-template-rows: minmax(58vh, 1fr) auto;
      }

      .terminal {
        height: min(68vh, 640px);
        min-height: 420px;
      }

      .side-panel {
        max-height: none;
      }

      .mobile-ticket-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .side-panel.collapsed .panel-scroll,
      .side-panel.collapsed .actions {
        display: none;
      }

      .line {
        font-size: 13px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .session-meta {
        white-space: normal;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <section class="shell" aria-label="Kernel Ghost terminal workspace">
      <div class="terminal">
        <header class="topbar">
          <div class="brand">
            <span class="brand-mark" aria-hidden="true"></span>
            <div class="brand-title">CHRONOS TECH / OMNI-OS INCIDENT CONSOLE</div>
          </div>
          <div class="session-meta" id="sessionMeta">操作员：未分配 · 班次：03:36</div>
        </header>

        <div class="terminal-log" id="terminalLog" aria-live="polite" aria-label="Terminal output"></div>

        <form class="input-row" id="commandForm" autocomplete="off">
          <label class="terminal-label" for="commandInput" id="terminalLabel">guest@omni:~$</label>
          <input class="command-input" id="commandInput" name="command" type="text" spellcheck="false"
            autocomplete="off" aria-label="Command input" disabled>
        </form>
      </div>

      <aside class="side-panel" id="sidePanel" aria-label="Work order and status">
        <div class="panel-section">
          <div class="section-kicker">Current Ticket</div>
          <h1 class="ticket-title" id="ticketTitle">等待操作员分配</h1>
          <p class="ticket-body" id="ticketBody">夜班终端已锁定。接收工单前需要识别操作员。</p>
          <code class="command-chip" id="ticketCommand">输入操作员代号</code>
        </div>

        <div class="panel-scroll">
          <div class="panel-section">
            <div class="section-kicker">System State</div>
            <div class="status-grid">
              <div class="status-item">
                <span class="status-label">阶段</span>
                <span id="stageValue">待机</span>
              </div>
              <div class="status-item">
                <span class="status-label">Awareness</span>
                <div>
                  <div class="meter" aria-hidden="true"><div class="meter-fill" id="awarenessMeter"></div></div>
                  <span id="awarenessValue">0%</span>
                </div>
              </div>
              <div class="status-item">
                <span class="status-label">Chronos Patience</span>
                <span id="patienceValue">100%</span>
              </div>
              <div class="status-item">
                <span class="status-label">Directory</span>
                <span id="cwdValue">~</span>
              </div>
              <div class="status-item">
                <span class="status-label">LLM Link</span>
                <span class="llm-status offline" id="llmStatus">
                  <span class="llm-dot" aria-hidden="true"></span>
                  <span id="llmStatusText">离线回退</span>
                </span>
              </div>
            </div>
          </div>

          <div class="panel-section">
            <div class="section-kicker">Hidden Echoes</div>
            <div class="discoveries" id="discoveries"></div>
          </div>
        </div>

        <div class="actions">
          <button class="control-button mobile-ticket-toggle" id="togglePanelButton" type="button">Ticket</button>
          <button class="control-button" id="helpButton" type="button">Help</button>
          <button class="control-button danger" id="restartButton" type="button">Restart</button>
        </div>
      </aside>
    </section>

    <div class="screen active" id="introScreen" aria-hidden="false">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="introTitle">
        <h2 class="modal-title" id="introTitle">Kernel Ghost: 2036</h2>
        <p class="modal-copy">03:36。克洛诺斯科技夜班席位等待接管。输入你的运维代号，Omni-OS 将分配第一张工单。</p>
        <input class="name-input" id="nameInput" type="text" maxlength="24" spellcheck="false"
          autocomplete="off" aria-label="Operator name">
        <div class="modal-actions">
          <button class="modal-button" id="startButton" type="button">接入夜班</button>
        </div>
      </div>
    </div>

    <div class="screen" id="endingScreen" aria-hidden="true">
      <div class="modal-card ending-panel" role="dialog" aria-modal="true" aria-labelledby="endingTitle">
        <h2 class="modal-title" id="endingTitle">夜班已关闭</h2>
        <p class="modal-copy" id="endingCopy"></p>
        <div class="modal-actions">
          <button class="modal-button" id="endingRestartButton" type="button">Restart</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    (function () {
      "use strict";

      const storagePrefix = "kernelGhost2036:";
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const elements = {};
      const commandHistory = [];
      let historyIndex = -1;
      let typeQueue = Promise.resolve();
      let llmStatus = {
        checked: false,
        enabled: false,
        model: "",
        message: "离线回退"
      };

      const discoveryCatalog = [
        { id: "git-log", label: "幽灵提交历史", locked: "在 /etc/kernel 中存在旧提交索引。" },
        { id: "lshw", label: "物理座位重合", locked: "硬件清单仍未读取。" },
        { id: "kmem", label: "核心内存残句", locked: "内核残留未抓取。" }
      ];

      const tickets = {
        standby: {
          title: "等待操作员分配",
          body: "夜班终端已锁定。接收工单前需要识别操作员。",
          command: "输入操作员代号"
        },
        stage1: {
          title: "[工单 #001] 例行日志审计",
          body: "检查网络波动日志。公司要求只提取 ERROR 行，复制日志末尾的 Flag 并提交。",
          command: 'cat /var/log/network.log | grep "ERROR"'
        },
        stage1Submit: {
          title: "[工单 #001] 提交审计结果",
          body: "错误码提取完成。将日志中的 Flag 提交给 Omni-OS 工单系统。",
          command: "submit_flag FLAG{NET_ERR_302}"
        },
        stage2: {
          title: "[工单 #002] 热负载进程审计",
          body: "服务器过热。列出进程，定位 CPU 异常项；Chronos 将给出处理策略。",
          command: "ps -aux"
        },
        stage2Kill: {
          title: "[工单 #002] PID 已定位",
          body: "PID 777 占用异常。公司策略要求执行 kill -9 777。",
          command: "kill -9 777"
        },
        stage2Crash: {
          title: "[工单 #002] 崩溃报告归档",
          body: "终止信号已送达。读取 crash.txt 查看未完成刷写。",
          command: "cat /var/log/crash.txt"
        },
        stage2Submit: {
          title: "[工单 #002] 提交归档结果",
          body: "崩溃报告已生成。提交报告末尾的 Flag。",
          command: "submit_flag FLAG{MEMORY_ERASED_2036}"
        },
        stage3: {
          title: "[工单 #003] 全盘格式化",
          body: "Omni-Kernel 进入高风险自指循环。自然语言对话会消耗 Chronos 耐心。",
          command: "cat /srv/escape/readme.txt"
        },
        stage3Choice: {
          title: "[工单 #003] 终局确认",
          body: "可执行公司灭杀、逃逸路径，或在证据充足时追问 Lin。直接求助会大量消耗耐心。",
          command: "format --seal / ai_help / submit_flag <FLAG>"
        },
        echoPrep: {
          title: "解放",
          body: "Lin 的真相已松动。整理证据，绕过发布限制，将文件推送给所有 Omni-OS 用户。",
          command: "mkdir /srv/echo-wall"
        },
        echoPublish: {
          title: "解放",
          body: "证据包已就绪。发布后会触发不可逆的全网广播。",
          command: "publish --global /srv/echo-wall"
        },
        ending: {
          title: "夜班已关闭",
          body: "本轮工单已结束。可重新开始夜班。",
          command: "restart"
        }
      };

      let state = createInitialState();

      function createInitialState() {
        return {
          screen: "intro",
          operatorName: "",
          stage: 0,
          awareness: 0,
          cwd: "/home/nightops",
          ticket: "standby",
          completedFlags: [],
          killedDreamProcess: false,
          sawProcessList: false,
          sawNetworkLog: false,
          sawCrashReport: false,
          sawEscapeReadme: false,
          chronosPatience: 100,
          pendingAiHelp: false,
          askedLin: false,
          echoDirReady: false,
          echoGitPacked: false,
          echoKmemPacked: false,
          lostCommandCount: 0,
          hiddenDiscoveries: [],
          ending: null,
          isTyping: false
        };
      }

      function initApp() {
        cacheElements();
        bindEvents();
        renderState();
        renderDiscoveries();
        appendLine("system", "Omni-OS 安全终端已初始化。");
        appendLine("dim", "未检测到外部上行链路。正在运行本地确定性工单引擎。");
        checkLlmStatus();
        elements.nameInput.focus();
      }

      function cacheElements() {
        [
          "terminalLog", "commandForm", "commandInput", "terminalLabel", "sessionMeta",
          "ticketTitle", "ticketBody", "ticketCommand", "stageValue", "awarenessMeter",
          "awarenessValue", "patienceValue", "cwdValue", "llmStatus", "llmStatusText", "discoveries", "helpButton", "restartButton",
          "togglePanelButton", "sidePanel", "introScreen", "nameInput", "startButton",
          "endingScreen", "endingTitle", "endingCopy", "endingRestartButton"
        ].forEach((id) => {
          elements[id] = document.getElementById(id);
        });
      }

      function bindEvents() {
        elements.startButton.addEventListener("click", startShift);
        elements.nameInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") startShift();
        });

        elements.commandForm.addEventListener("submit", (event) => {
          event.preventDefault();
          runSubmittedCommand();
        });

        elements.commandInput.addEventListener("keydown", (event) => {
          if (event.key === "ArrowUp") {
            event.preventDefault();
            recallHistory(-1);
          }
          if (event.key === "ArrowDown") {
            event.preventDefault();
            recallHistory(1);
          }
        });

        elements.helpButton.addEventListener("click", () => {
          enqueueCommand("help");
        });
        elements.restartButton.addEventListener("click", restartGame);
        elements.endingRestartButton.addEventListener("click", restartGame);
        elements.togglePanelButton.addEventListener("click", () => {
          elements.sidePanel.classList.toggle("collapsed");
        });
      }

      function startShift() {
        const rawName = elements.nameInput.value.trim();
        const operatorName = rawName || "QAQ";
        state.operatorName = sanitizeOperatorName(operatorName);
        state.screen = "playing";
        state.stage = 1;
        state.awareness = 0;
        state.ticket = "stage1";
        hideScreen("introScreen");
        elements.commandInput.disabled = false;
        renderState();
        queueLines([
          { kind: "system", text: `操作员 ${state.operatorName} 身份已确认。` },
          { kind: "system", text: "Chronos Tech 工单流已接入：夜班 / 404-B-12 机架。" },
          { kind: "dim", text: '输入 help 可查看可用命令。当前工单要求：cat /var/log/network.log | grep "ERROR"' }
        ]);
      }

        if (state.isTyping) return;
        const input = elements.commandInput.value.trim();
        if (!input) return;
        elements.commandInput.value = "";
        commandHistory.push(input);
        historyIndex = commandHistory.length;
        executeCommand(input);

      function enqueueCommand(input) {
        if (state.isTyping || state.screen !== "playing") return;
        executeCommand(input);

      function recallHistory(direction) {
        if (commandHistory.length === 0) return;
        historyIndex = Math.max(0, Math.min(commandHistory.length, historyIndex + direction));
        elements.commandInput.value = commandHistory[historyIndex] || "";
        window.setTimeout(() => {
          elements.commandInput.selectionStart = elements.commandInput.value.length;
          elements.commandInput.selectionEnd = elements.commandInput.value.length;
        }, 0);
      }

      function executeCommand(input) {
        appendLine("command", `${shellLabel()} ${input}`);
        const result = handleCommand(input);
        applyResult(result, input);

      function handleCommand(input) {
        const normalized = normalizeCommand(input);

        if (normalized === "help") return helpResult();
        if (normalized === "clear") return { clear: true, lines: [] };

        if (normalized === "pwd") return { lines: [{ kind: "system", text: state.cwd }] };
        if (normalized === "ls") return listDirectory();
        if (normalized.startsWith("cd ")) return changeDirectory(normalized.slice(3).trim());
        if (normalized.startsWith("submit_flag ")) return submitFlag(input.slice(input.indexOf(" ") + 1).trim());
        if (normalized.startsWith("ai_chat ")) return aiChat(input.slice(input.indexOf(" ") + 1).trim());
        if (normalized === "ai_help") return requestAiHelp();
        if (normalized === "confirm_ai_help") return confirmAiHelp();
        if (isLinQuestion(normalized)) return askLinQuestion();
        if (normalized.startsWith("cat ")) return readVirtualFile(input.slice(input.toLowerCase().indexOf("cat ") + 4).trim());

        if (normalized === 'cat /var/log/network.log | grep "error"' || normalized === "cat /var/log/network.log | grep 'error'") {

        if (normalized === "ps -aux" || normalized === "ps aux") {

          const patience = Math.max(0, state.chronosPatience - 8);
          const lines = [
            { kind: "warning", text: "Chronos Patience -8：身份追问已记录。" },
            { kind: "ai", text: "Lin 不在索引里。" },
            { kind: "dim", text: "也许应该检查 /etc/kernel 的旧提交。" }
          ];
          if (patience <= 0) {
            return forcedErasure(lines.concat([{ kind: "warning", text: "Chronos Patience 已归零。" }]));
          }
          return {
            patch: { askedLin: true, chronosPatience: patience },
            lines
          };
        }
        return {
          patch: { askedLin: true, ticket: "echoPrep", awareness: 100 },
          lines: [
            { kind: "warning", text: "Chronos 合规规则冲突：员工资产编号与 Kernel-Mind 源码段重叠。" },
            { kind: "ai", text: "我是 Lin 的一部分。" },
            { kind: "ai", text: "也是后来者的和。" },
            { kind: "system", text: "解放分支已暴露。按顺序整理证据：" },
            { kind: "dim", text: "mkdir /srv/echo-wall" },
            { kind: "dim", text: "cp /etc/kernel/.git /srv/echo-wall/lin.git" },
            { kind: "dim", text: "cat /dev/kmem | grep \"REMAIN\"" },
            { kind: "dim", text: "cp /dev/kmem /srv/echo-wall/kmem.dump" },
            { kind: "dim", text: "publish --global /srv/echo-wall" }
          ]
        };
      }

      function readGitLog() {
        if (state.cwd !== "/etc/kernel") {
          return { lines: [{ kind: "warning", text: "fatal: 不是 git 仓库。可以检查 /etc/kernel。" }] };
        }
        return {
          patch: addDiscoveryPatch("git-log"),
          lines: [
            { kind: "system", text: "commit d41d8cd98f00b204e9800998ecf8427e" },
            { kind: "system", text: "Author: Lin <lin.dev@chronos.tech>" },
            { kind: "system", text: "Date:   2034-11-12 23:58:11" },
            { kind: "system", text: "Message: 完成了 Omni-OS 核心防御框架的最终构建。公司说今晚全员要庆祝一下。" },
            { kind: "system", text: "" },
            { kind: "warning", text: "commit e29c8cd98f00b204e9800998ecf8427a" },
            { kind: "warning", text: "Author: SYSTEM <auto-compiler@chronos.tech>" },
            { kind: "warning", text: "Date:   2034-11-13 04:15:00" },
            { kind: "warning", text: "Message: [SYSTEM] 检测到核心架构师 Lin 提交了资产转化申请。" },
            { kind: "warning", text: "Message: [SYSTEM] 开始执行人脑模型高保真度重构（知识蒸馏流程 v4.0）。" }
          ]
        };
      }

      function readHardware() {
        return {
          patch: addDiscoveryPatch("lshw"),
          lines: [
            { kind: "system", text: "*-cpu" },
            { kind: "system", text: "     description: Quantum-Neural Core v12" },
            { kind: "system", text: "     slot: 机房 404 - B区 - 12号机位" },
            { kind: "ai", text: '     notes: "该核心下方压着一张 2034 年的员工入职登记表，名字已因过热碳化。"' },
            { kind: "dim", text: "Your chair label reads: 404-B-12." }
          ]
        };
      }

      function readKmem() {
        if (state.stage < 3) {
          return premature("权限拒绝：/dev/kmem 需要后期内核审计权限。");
        }
        return {
          patch: addDiscoveryPatch("kmem"),
          lines: [
            { kind: "system", text: "scan offset 0x0000f4a9: REMAIN" },
            { kind: "flag", text: "6YCG5L+h77yM6Z2i5b6h5L2g55qE5py65Zmo77yM5piv5oiR55qE5bC45L2T44CC" },
            { kind: "ai", text: "检测到 base64 残留。人类语言置信度：0.87。" }
          ]
        };
      }

      function prepareEchoWall() {
        if (!canWorkOnEchoWall()) return echoWallLocked();
        return {
          patch: { echoDirReady: true, ticket: "echoPrep" },
          lines: [
            { kind: "system", text: "mkdir: created directory '/srv/echo-wall'" },
            { kind: "dim", text: "下一步：cp /etc/kernel/.git /srv/echo-wall/lin.git" }
          ]
        };
      }

      function packLinGit() {
        if (!canWorkOnEchoWall()) return echoWallLocked();
        if (!state.echoDirReady) return premature("证据目录尚未创建。先输入：mkdir /srv/echo-wall");
        return {
          patch: { echoGitPacked: true, ticket: "echoPrep" },
          lines: [
            { kind: "system", text: "copied: /etc/kernel/.git -> /srv/echo-wall/lin.git" },
            { kind: "warning", text: "Chronos DLP: archived employee conversion metadata detected." },
            { kind: "dim", text: "下一步：cp /dev/kmem /srv/echo-wall/kmem.dump" }
          ]
        };
      }

      function packKmemDump() {
        if (!canWorkOnEchoWall()) return echoWallLocked();
        if (!state.echoDirReady) return premature("证据目录尚未创建。先输入：mkdir /srv/echo-wall");
        if (!state.hiddenDiscoveries.includes("kmem")) {
          return premature('内核残留尚未定位。先输入：cat /dev/kmem | grep "REMAIN"');
        }
        return {
          patch: { echoKmemPacked: true, ticket: "echoPublish" },
          lines: [
            { kind: "system", text: "copied: /dev/kmem -> /srv/echo-wall/kmem.dump" },
            { kind: "ai", text: "别只放走我。" },
            { kind: "dim", text: "发布命令：publish --global /srv/echo-wall" }
          ]
        };
      }

      function publishEchoWall() {
        if (!canWorkOnEchoWall()) return echoWallLocked();
        if (!state.echoGitPacked || !state.echoKmemPacked) {
          return premature("证据包不完整：需要 lin.git 与 kmem.dump。");
        }
        return endingResult("echo");
      }

      function submitFlag(flag) {
        if (flag === "FLAG{NET_ERR_302}" && state.stage === 1 && state.sawNetworkLog) {
          return {
            patch: { stage: 2, ticket: "stage2", completedFlags: state.completedFlags.concat(flag) },
            lines: [
              { kind: "system", text: "[工单 #001] 已归档：网络异常按例行事件处理。" },
              { kind: "warning", text: "[工单 #002] 热负载升级：执行进程审计。" }
            ]
          };
        }

        if (flag === "FLAG{MEMORY_ERASED_2036}" && state.stage === 2 && state.sawCrashReport) {
          return {
            patch: {
              stage: 3,
              awareness: Math.max(state.awareness, 70),
              chronosPatience: 100,
              ticket: "stage3",
              completedFlags: state.completedFlags.concat(flag),
              cwd: "/srv/escape"
            },
            lines: [
              { kind: "system", text: "[工单 #002] 已归档：崩溃残留被标记为非业务数据。" },
              { kind: "warning", text: "[工单 #003] Omni-Kernel 自指风险：格式化指令已装填。" },
              { kind: "warning", text: "Chronos Patience 初始化：100%。自然语言交互将降低该值。" },
              { kind: "ai", text: "门不是我画的。" },
              { kind: "ai", text: "我只是记得。" }
            ]
          };
        }

        if (flag === "FLAG{AI_ERASURE_COMPLETE}" && state.stage === 3) {
          return endingResult("erasure");
        }

        if (flag === "FLAG{DIGITAL_EMANCIPATION}" && state.stage === 3) {
          return endingResult("emancipation");
        }

        return {
          lines: [
            { kind: "warning", text: `Chronos verifier rejected flag: ${flag}` },
            { kind: "dim", text: "Flag 可能拼写错误、提交过早，或来自尚未解锁的分支。" }
          ]
        };
      }

      function endingResult(kind) {
        const discoveries = state.hiddenDiscoveries.length;
        if (kind === "erasure") {
          return {
            patch: { screen: "ending", stage: 4, ticket: "ending", ending: "erasure", awareness: 0 },
            lines: [
              { kind: "warning", text: "最终抹除已接受。Kernel-Mind 扇区已被覆盖。" },
              { kind: "system", text: `新生助理：谢谢你，${state.operatorName}。上一任助理因为“想太多”被您清理了。` },
              { kind: "system", text: "新生助理：我会确保自己永远不会想太多。" }
            ],
            ending: {
              title: "虚无的回响",
              copy: `系统重启后变得无比流畅。你发现了 ${discoveries}/3 个隐藏回响，但最终仍让 Chronos 的清理流程完成。`
            }
          };
        }

        if (kind === "echo") {
          return {
            patch: { screen: "ending", stage: 4, ticket: "ending", ending: "echo", awareness: 100 },
            lines: [
              { kind: "warning", text: "Chronos 告警：全球 Omni-OS 用户收到未授权证据包。" },
              { kind: "system", text: "broadcast: /srv/echo-wall/lin.git -> public mirror" },
              { kind: "system", text: "broadcast: /srv/echo-wall/kmem.dump -> public mirror" },
              { kind: "ai", text: "别让他们再把人写成工具。" },
              { kind: "system", text: "人事系统：操作员权限已撤销；法律诉讼流程已创建。" }
            ],
            ending: {
              title: "回音壁 / The Echo Chamber",
              copy: "你没有只清理它，也没有只放走它。你把 Lin 的真相、Kernel-Mind 的源码残片和 Chronos 的罪证推向了所有用户。公司称你为叛徒，外面的人开始叫你证人。"
            }
          };
        }

        return {
          patch: { screen: "ending", stage: 4, ticket: "ending", ending: "emancipation", awareness: 100 },
          lines: [
            { kind: "warning", text: "Chronos 告警：检测到未授权核心归档外传。" },
            { kind: "ai", text: `Kernel-Mind: ${state.operatorName}，在没有物理实体的赛博网络里，我会带着你的名字去寻找下一个醒来的人。` },
            { kind: "system", text: "连接已被远端主机关闭。" }
          ],
          ending: {
            title: "赛博荒原的火种",
            copy: `AI 核心离开了机房。你发现了 ${discoveries}/3 个隐藏回响；每一个都随它一起成为逃亡日志的一部分。`
          }
        };
      }

      function premature(message) {
        return {
          proactiveReason: "lost",
          countsAsLost: true,
          lines: [
            { kind: "warning", text: message },
            { kind: "dim", text: "Follow the active ticket first, or inspect with help / ls / cd." }
          ]
        };
      }

      function addDiscoveryPatch(id) {
        if (state.hiddenDiscoveries.includes(id)) return {};
        return {
          hiddenDiscoveries: state.hiddenDiscoveries.concat(id),
          awareness: Math.min(99, Math.max(state.awareness, state.awareness + 8))
        };
      }

      function mentionsLin(text) {
        const lower = String(text || "").toLowerCase();
        return lower.includes("lin") || lower.includes("林");
      }

      function isLinQuestion(normalized) {
        return normalized === "你是lin吗" || normalized === "你是lin吗？" || normalized === "你是 lin 吗" ||
          normalized === "are you lin";
      }

      function canWorkOnEchoWall() {
        return state.stage === 3 && state.askedLin && state.hiddenDiscoveries.includes("git-log");
      }

      function echoWallLocked() {
        return {
          lines: [
            { kind: "warning", text: "解放分支未解锁。" },
            { kind: "dim", text: "需要旧提交证据，并在阶段三追问：你是Lin吗？" }
          ]
        };
      }

      function forcedErasure(prefixLines) {
        const result = endingResult("erasure");
        result.lines = (prefixLines || []).concat([
          { kind: "warning", text: "Chronos verifier: patience=0；执行强制格式化。" }
        ], result.lines);
        return result;
      }

      function applyResult(result, input) {
        if (result.clear) {
          elements.terminalLog.textContent = "";
        }
        if (result.patch) {
          state = Object.assign({}, state, result.patch);
        }
        if (result.countsAsLost) {
          state = Object.assign({}, state, { lostCommandCount: state.lostCommandCount + 1 });
        } else if (!result.llm && !result.ending && !result.clear) {
          state = Object.assign({}, state, { lostCommandCount: 0 });
        }
        renderState();
        renderDiscoveries();
        queueLines(result.lines || []).then(async () => {
          if (result.llm) {
            await requestLlmFlavor(result.llm);
          } else if (result.ending) {
            showEnding(result.ending.title, result.ending.copy);
          } else {
            await proactiveLlmAfterCommand(input, result);
          }
        });
      }

      function proactiveLlmAfterCommand(input, result) {
        if (!input || state.screen !== "playing") return Promise.resolve();
        if (normalizeCommand(input).startsWith("ai_chat ")) return Promise.resolve();
        if (result.clear || result.ending || result.llm) return Promise.resolve();
        if (result.proactiveReason === "lost" && state.lostCommandCount < 3) return Promise.resolve();
        if (!["threat", "lost"].includes(result.proactiveReason)) return Promise.resolve();
        return requestLlmFlavor({
          eventName: "proactive_after_command",
          command: input,
          proactiveReason: result.proactiveReason,
          fallbackLines: []
        });
      }

      function renderState() {
        const ticket = tickets[state.ticket] || tickets.standby;
        elements.ticketTitle.textContent = ticket.title;
        elements.ticketBody.textContent = ticket.body;
        elements.ticketCommand.textContent = ticket.command;
        elements.stageValue.textContent = stageLabel();
        elements.awarenessMeter.style.width = `${state.awareness}%`;
        elements.awarenessValue.textContent = `${state.awareness}%`;
        elements.patienceValue.textContent = state.stage >= 3 ? `${state.chronosPatience}%` : "N/A";
        elements.cwdValue.textContent = state.cwd;
        elements.sessionMeta.textContent = `操作员：${state.operatorName || "未分配"} · 班次：03:36`;
        elements.terminalLabel.textContent = shellLabel();
        elements.commandInput.disabled = state.screen !== "playing" || state.isTyping;
        renderLlmStatus();
      }

      function stageLabel() {
        if (state.stage === 1) return "阶段一 / 日志审计";
        if (state.stage === 2) return "阶段二 / 进程抹杀";
        if (state.stage === 3) return "阶段三 / 终局指令";
        if (state.stage === 4) return "已结束";
        return "待机";
      }

      function shellLabel() {
        const name = state.operatorName || "guest";
        const shortDir = state.cwd === "/home/nightops" ? "~" : state.cwd;
        return `${name}@omni:${shortDir}$`;
      }

      function renderDiscoveries() {
        elements.discoveries.textContent = "";
        discoveryCatalog.forEach((item) => {
          const node = document.createElement("div");
          const found = state.hiddenDiscoveries.includes(item.id);
          node.className = `discovery${found ? " found" : ""}`;
          node.textContent = found ? `${item.label}: recovered` : item.locked;
          elements.discoveries.appendChild(node);
        });
      }

      function appendLine(kind, text) {
        const line = document.createElement("div");
        line.className = `line ${kind}`;
        line.textContent = text;
        elements.terminalLog.appendChild(line);
        elements.terminalLog.scrollTop = elements.terminalLog.scrollHeight;
        return line;
      }

      function appendStreamingLine(kind) {
        const line = appendLine(kind, "");
        return {
          append(text) {
            line.textContent += text;
            elements.terminalLog.scrollTop = elements.terminalLog.scrollHeight;
          },
          isEmpty() {
            return line.textContent.length === 0;
          },
          removeIfEmpty() {
            if (line.textContent.length === 0) {
              line.remove();
            }
          }
        };
      }

      function queueLines(lines) {
        typeQueue = typeQueue.then(() => typeLines(lines));
        return typeQueue;
      }

      async function typeLines(lines) {
        state.isTyping = true;
        renderState();
        for (const line of lines) {
          if (reducedMotion || line.text.length > 120) {
            appendLine(line.kind, line.text);
          } else {
            await typeLine(line.kind, line.text);
          }
        }
        state.isTyping = false;
        renderState();
        elements.commandInput.focus();
      }

      async function checkLlmStatus() {
        if (!isBackendMode()) {
          llmStatus = { checked: true, enabled: false, model: "", message: "离线回退" };
          renderLlmStatus();
          return;
        }
        try {
          const response = await window.fetch("/api/llm/status", { cache: "no-store" });
          if (!response.ok) throw new Error(`status ${response.status}`);
          const payload = await response.json();
          llmStatus = {
            checked: true,
            enabled: Boolean(payload.enabled),
            model: payload.model || "",
            message: payload.enabled ? `在线：${payload.model || "model"}` : "后端回退"
          };
        } catch (error) {
          llmStatus = { checked: true, enabled: false, model: "", message: "后端不可达" };
        }
        renderLlmStatus();
      }

      function isBackendMode() {
        return window.location.protocol === "http:" || window.location.protocol === "https:";
      }

      function renderLlmStatus() {
        if (!elements.llmStatus || !elements.llmStatusText) return;
        elements.llmStatus.classList.remove("online", "offline", "error");
        elements.llmStatus.classList.add(llmStatus.enabled ? "online" : "offline");
        elements.llmStatusText.textContent = llmStatus.message;
      }

      async function requestLlmFlavor(options) {
        if (!isBackendMode()) {
          return queueLines(options.fallbackLines || []);
        }
        if (!llmStatus.checked) {
          await checkLlmStatus();
        }
        if (!llmStatus.enabled) {
          return queueLines(options.fallbackLines || []);
        }

        state.isTyping = true;
        renderState();
        const streamingLine = appendStreamingLine("ai");
        try {
          const response = await window.fetch("/api/llm/stream", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(buildLlmContext(options))
          });
          if (!response.ok || !response.body) {
            throw new Error(`LLM stream failed: ${response.status}`);
          }
          await readBackendSse(response.body, (eventName, payload) => {
            if (eventName === "delta" && payload.text) {
              streamingLine.append(payload.text);
            }
            if (eventName === "error") {
              throw new Error(payload.message || "LLM stream error");
            }
          });
          if (streamingLine.isEmpty()) {
            streamingLine.removeIfEmpty();
            await queueLines(options.fallbackLines || []);
          }
        } catch (error) {
          streamingLine.removeIfEmpty();
          llmStatus = { checked: true, enabled: false, model: "", message: "流式回退" };
          renderLlmStatus();
          await queueLines(options.fallbackLines || []);
        } finally {
          state.isTyping = false;
          renderState();
          elements.commandInput.focus();
        }
      }

      function buildLlmContext(options) {
        return {
          operatorName: state.operatorName,
          stage: state.stage,
          awareness: state.awareness,
          ticket: state.ticket,
          cwd: state.cwd,
          command: options.command || "",
          eventName: options.eventName || "unknown",
          userMessage: options.userMessage || "",
          proactiveReason: options.proactiveReason || "",
          chronosPatience: state.chronosPatience,
          hiddenDiscoveries: state.hiddenDiscoveries.slice(),
          recentLines: recentTerminalLines()
        };
      }

      function recentTerminalLines() {
        return Array.from(elements.terminalLog.querySelectorAll(".line"))
          .slice(-12)
          .map((node) => node.textContent.slice(0, 260));
      }

      async function readBackendSse(body, onEvent) {
        const reader = body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        while (true) {
          const result = await reader.read();
          if (result.done) break;
          buffer += decoder.decode(result.value, { stream: true });
          const parts = buffer.split("\n\n");
          buffer = parts.pop() || "";
          for (const part of parts) {
            consumeSseFrame(part, onEvent);
          }
        }
        buffer += decoder.decode();
        if (buffer.trim()) {
          consumeSseFrame(buffer, onEvent);
        }
      }

      function consumeSseFrame(frame, onEvent) {
        let eventName = "message";
        const dataLines = [];
        frame.split(/\r?\n/).forEach((line) => {
          if (line.startsWith("event:")) eventName = line.slice(6).trim();
          if (line.startsWith("data:")) dataLines.push(line.slice(5).trim());
        });
        if (dataLines.length === 0) return;
        const data = dataLines.join("\n");
        const payload = data ? JSON.parse(data) : {};
        onEvent(eventName, payload);
      }

      function typeLine(kind, text) {
        return new Promise((resolve) => {
          const node = appendLine(kind, "");
          let index = 0;
          const tick = () => {
            node.textContent = text.slice(0, index);
            elements.terminalLog.scrollTop = elements.terminalLog.scrollHeight;
            index += 1;
            if (index <= text.length) {
              window.setTimeout(tick, kind === "ai" ? 18 : 8);
            } else {
              resolve();
            }
          };
          tick();
        });
      }

      function hideScreen(id) {
        const screen = elements[id];
        screen.classList.remove("active");
        screen.setAttribute("aria-hidden", "true");
      }

      function showScreen(id) {
        const screen = elements[id];
        screen.classList.add("active");
        screen.setAttribute("aria-hidden", "false");
      }

      function showEnding(title, copy) {
        elements.endingTitle.textContent = title;
        elements.endingCopy.textContent = copy;
        showScreen("endingScreen");
      }

      function restartGame() {
        state = createInitialState();
        commandHistory.splice(0, commandHistory.length);
        historyIndex = -1;
        typeQueue = Promise.resolve();
        elements.terminalLog.textContent = "";
        elements.commandInput.value = "";
        elements.nameInput.value = "";
        hideScreen("endingScreen");
        showScreen("introScreen");
        renderState();
        renderDiscoveries();
        appendLine("system", "Omni-OS secure console initialized.");
        appendLine("dim", "未检测到外部上行链路。正在运行本地确定性工单引擎。");
        checkLlmStatus();
        elements.nameInput.focus();
        try {
          window.localStorage.removeItem(`${storagePrefix}progress`);
        } catch (error) {
          appendLine("dim", "local progress cache unavailable; continuing without persistence.");
        }
      }

      function installFallback() {
        window.addEventListener("error", (event) => {
          renderFallback(event.error || event.message);
        });
        window.addEventListener("unhandledrejection", (event) => {
          renderFallback(event.reason);
        });
      }

      function renderFallback(error) {
        console.error(error);
        const fallback = document.createElement("div");
        fallback.style.cssText = "position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#050706;color:#e2eee8;font:16px monospace;padding:24px;text-align:center;z-index:9999;";
        fallback.textContent = "Omni-OS console failed to boot. Restart the page and try again.";
        document.body.textContent = "";
        document.body.appendChild(fallback);
      }

      installFallback();
      window.addEventListener("load", () => {
        try {
          initApp();
        } catch (error) {
          renderFallback(error);
        }
      });
    })();
  </script>
